name: Ensure GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write

jobs:
  enable-pages:
    runs-on: ubuntu-latest
    steps:
      - name: Enable Pages from main branch
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
        shell: bash
        run: |
          set -euo pipefail
          body='{"source":{"branch":"main","path":"/"}}'
          status="$(curl -sS -o response.json -w "%{http_code}" \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${REPOSITORY}/pages" \
            -d "${body}")"

          if [[ "${status}" == "201" || "${status}" == "409" ]]; then
            cat response.json
            exit 0
          fi

          cat response.json
          exit 1
